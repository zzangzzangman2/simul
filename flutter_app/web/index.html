<!DOCTYPE html>
<html lang="ko">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="1999년 마지막 밤, 열 살 소년이 가족과 현금 0원에서 시작하는 밝은 2D 투자 모험">
  <meta name="theme-color" content="#BDEBFA">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="밀레니엄 캐피탈">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>밀레니엄 캐피탈 — 열 살 소년의 첫 투자 모험</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script id="legacy-save-bridge">
    (() => {
      const legacyKey = 'simul-millennium-capital-v1';
      const flutterKey = `flutter.${legacyKey}`;

      try {
        if (localStorage.getItem(flutterKey) !== null) return;
        const legacySave = localStorage.getItem(legacyKey);
        if (legacySave !== null) {
          const parsed = JSON.parse(legacySave);
          if (
            !parsed ||
            Array.isArray(parsed) ||
            typeof parsed !== 'object' ||
            typeof parsed.companyName !== 'string' ||
            parsed.companyName.trim() === ''
          ) return;
          // shared_preferences_web JSON-encodes string values in localStorage.
          localStorage.setItem(flutterKey, JSON.stringify(legacySave));
        }
      } catch (_) {
        // Storage can be unavailable in private or restricted browser contexts.
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
