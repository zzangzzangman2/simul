<body>
  <div id="flutter_host"></div>
  <script id="mobile-viewport-lock">
    (() => {
      const root = document.documentElement;
      const host = document.getElementById('flutter_host');
      const viewport = window.visualViewport;
      const keyboardThreshold = 120;
      let layoutHeight = Math.max(
        root.clientHeight,
        window.innerHeight,
        viewport?.height ?? 0,
      );

      const applyLayout = () => {
        root.style.setProperty('--app-height', `${Math.round(layoutHeight)}px`);
        host.style.height = `${Math.round(layoutHeight)}px`;
        window.scrollTo(0, 0);
        document.body.scrollTop = 0;
      };

      const refreshLayout = () => {
        const visibleHeight = viewport?.height ?? window.innerHeight;
        const keyboardVisible = layoutHeight - visibleHeight > keyboardThreshold;
        if (!keyboardVisible) {
          layoutHeight = Math.max(root.clientHeight, window.innerHeight, visibleHeight);
        }
        window.requestAnimationFrame(applyLayout);
      };

      window.addEventListener('resize', refreshLayout, { passive: true });
      viewport?.addEventListener('resize', refreshLayout, { passive: true });
      viewport?.addEventListener('scroll', () => {
        window.requestAnimationFrame(applyLayout);
      }, { passive: true });
      window.addEventListener('orientationchange', () => {
        window.setTimeout(() => {
          layoutHeight = Math.max(
            root.clientHeight,
            window.innerHeight,
            viewport?.height ?? 0,
          );
          applyLayout();
        }, 250);
      });

      applyLayout();
    })();
  </script>
  <script id="legacy-save-bridge">
    (() => {
      const legacyKey = 'simul-millennium-capital-v1';
      const flutterKey = `flutter.${legacyKey}`;
      const bridgeMarkerKey = `${legacyKey}-flutter-bridge-v1`;

      try {
        if (localStorage.getItem(bridgeMarkerKey) !== null) return;
        if (localStorage.getItem(flutterKey) !== null) {
          localStorage.setItem(bridgeMarkerKey, '1');
          return;
        }
        const legacySave = localStorage.getItem(legacyKey);
        if (legacySave !== null) {
          const parsed = JSON.parse(legacySave);
          if (
            !parsed ||
            Array.isArray(parsed) ||
            typeof parsed !== 'object' ||
            typeof parsed.companyName !== 'string' ||
            parsed.companyName.trim() === ''
          ) return;
          // shared_preferences_web JSON-encodes string values in localStorage.
          localStorage.setItem(flutterKey, JSON.stringify(legacySave));
          localStorage.setItem(bridgeMarkerKey, '1');
        }
      } catch (_) {
        // Storage can be unavailable in private or restricted browser contexts.
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
